<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{!'SymboLab'} v1.4 - The Hybrid Engine</title>
    <style>
        :root { --neon-green: #00ff41; --bg-black: #0d0d0d; --editor-bg: #1a1a1a; --error-red: #ff4141; }
        body { background: var(--bg-black); color: var(--neon-green); font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; border: 2px solid var(--neon-green); padding: 25px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.3); border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { margin: 0; text-shadow: 0 0 10px var(--neon-green); font-size: 24px; }
        .docs-link { color: var(--neon-green); text-decoration: none; border: 1px solid var(--neon-green); padding: 5px 12px; font-size: 14px; border-radius: 4px; transition: 0.3s; }
        .docs-link:hover { background: var(--neon-green); color: black; }
        textarea { width: 100%; height: 350px; background: var(--editor-bg); color: var(--neon-green); border: 1px solid #333; padding: 15px; font-size: 16px; outline: none; box-sizing: border-box; resize: vertical; }
        button { background: var(--neon-green); color: black; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; margin-top: 15px; border-radius: 4px; }
        #console { background: black; color: var(--neon-green); padding: 20px; margin-top: 20px; border: 1px dashed #333; min-height: 120px; white-space: pre-wrap; }
        .error { color: var(--error-red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>{!'SymboLab'} v1.4</h1>
        <a href="handbook.html" target="_blank" class="docs-link">? How to Use</a>
    </div>

    <textarea id="editor" spellcheck="false">{
~ Test the Hybrid Engine ~
~ input is string by default ~

?'What is your name?'user
!'Hello, ',user**

~ Now for math ~
?'Enter a number:'n
$val%\'n**'\
$res%val.2

~ Use Freezer on the value ~
!'Half of your number is: ',/res**/
}</textarea>

    <button onclick="runEngine()">RUN ENGINE</button>
    <div id="console"></div>
</div>

<script>
function runEngine() {
    const output = document.getElementById("console");
    let rawCode = document.getElementById("editor").value.trim();
    output.innerHTML = "";
    let variables = {};

    try {
        let commentMatches = rawCode.match(/~.*?~/gs) || [];
        let commentLen = commentMatches.reduce((acc, val) => acc + val.length, 0);
        let functionalCode = rawCode.replace(/~.*?~/gs, "").replace(/\s/g, "");
        let codeLen = functionalCode.length;

        if (commentLen > (codeLen * 1.5) && codeLen > 0) {
            output.innerHTML = `<span class="error">Brah this isnt a notebook: Ratio too high!</span>`;
            return;
        }

        if (!rawCode.startsWith("{") || !rawCode.endsWith("}")) {
            output.innerHTML = `<span class="error">SyntaxError: Use { }</span>`;
            return;
        }
        
        let code = rawCode.slice(1, -1).replace(/~.*?~/gs, "").trim();
        let lines = code.split(/\n|;/);

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            // PROBE: ?'prompt'var
            if (line.startsWith("?")) {
                let promptMsg = line.match(/'(.*?)'/)[1];
                let vName = line.split("'")[2].trim().replace("$","");
                variables[vName] = prompt(promptMsg);
            }

            // OUTPUT !'text',var**,/var**/
            else if (line.startsWith("!")) {
                let parts = line.substring(1).split(',');
                let finalOut = parts.map(p => {
                    p = p.trim();
                    if (p.startsWith("'") && p.endsWith("'")) return p.slice(1, -1);
                    
                    // Handle Freezer + Value: /var**/
                    if (p.startsWith("/") && p.endsWith("/") && p.includes("**")) {
                        let vName = p.slice(1, -3).replace("$", "");
                        return String(variables[vName]);
                    }
                    
                    // Handle Value: var**
                    if (p.endsWith("**")) {
                        let vName = p.slice(0, -2).replace("$", "");
                        return variables[vName] !== undefined ? variables[vName] : "undefined";
                    }
                    return p;
                }).join("");
                output.innerHTML += finalOut + "\n";
            }

            // ASSIGNMENT var%'val'
            else if (line.includes("%")) {
                let [vName, vVal] = line.split("%");
                vName = vName.trim().replace("$", "");
                vVal = vVal.trim();

                // MELTER \'var**'\
                if (vVal.startsWith("\\'") && vVal.endsWith("'\\")) {
                    let target = vVal.slice(2, -2);
                    if (target.endsWith("**")) target = target.slice(0, -2);
                    let val = variables[target];
                    if (isNaN(parseFloat(val))) {
                        output.innerHTML += `<span class="error">Bruh why melt "${val}"?</span>\n`;
                        return;
                    }
                    variables[vName] = parseFloat(val);
                } 
                else if (vVal.startsWith("'") && vVal.endsWith("'")) variables[vName] = vVal.slice(1, -1);
                else variables[vName] = isNaN(vVal) ? vVal : parseFloat(vVal);
            }

            // MATH: . (Div) or # (Root)
            else if (line.includes(".") || line.includes("#")) {
                let op = line.includes(".") ? "." : "#";
                let [n1, n2] = line.split(op);
                let v1 = variables[n1.trim().replace("$","")] ?? parseFloat(n1);
                let v2 = variables[n2.trim().replace("$","")] ?? parseFloat(n2);

                if (op === ".") {
                    if (v2 === 0) {
                        output.innerHTML += `<span class="error">ZeroGravityError!</span>\n`;
                        return;
                    }
                    variables[n1.trim().replace("$","")] = v1 / v2;
                } else {
                    if (v2 < 0 && v1 % 2 === 0) {
                        output.innerHTML += `<span class="error">Stap: No imaginary friends.</span>\n`;
                        return;
                    }
                    variables[n2.trim().replace("$","")] = v2 < 0 ? -Math.pow(Math.abs(v2), 1/v1) : Math.pow(v2, 1/v1);
                }
            }

            // LOOPS <count|code>
            else if (line.startsWith("<") && line.endsWith(">")) {
                let countPart = line.substring(1, line.indexOf("|")).trim();
                let inner = line.substring(line.indexOf("|") + 1, line.length - 1).trim();
                let count = variables[countPart] ?? parseInt(countPart);

                for (let i = 0; i < count; i++) {
                    let target = inner.slice(0, -1).trim().replace("$","");
                    if (inner.endsWith("+")) variables[target]++;
                    else if (inner.endsWith("-")) variables[target]--;
                }
            }
        }
    } catch (e) {
        output.innerHTML += `<span class="error">OVERHEAT: ${e.message}</span>`;
    }
}
</script>
</body>
</html>
